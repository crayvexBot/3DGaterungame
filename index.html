<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gate Horror</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

/* UI */
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  z-index:10;
}

/* EAT BUTTON */
#eatBtn{
  position:absolute;
  bottom:180px;
  right:40px;
  width:110px;
  height:60px;
  background:rgba(0,255,100,0.15);
  border:2px solid #00ff88;
  color:white;
  font-size:18px;
  display:none;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  z-index:999;
  user-select:none;
}

/* ELEVATOR */
#elevator, #loading{
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:20;
}

/* JOYSTICK */
#joyBase {
  position:absolute;
  bottom:40px;
  left:40px;
  width:120px;
  height:120px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
}

#joyStick {
  position:absolute;
  width:50px;
  height:50px;
  background:white;
  border-radius:50%;
  top:35px;
  left:35px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
</head>

<body>

<div id="elevator"><h1>🛗 Elevator Descending...</h1></div>
<div id="loading" style="display:none;"><h2>LOADING...</h2></div>

<div id="ui">
  <h3>🚪 Gate: <span id="gate">1</span></h3>
  <h3>❤️ HP: <span id="hp">100</span></h3>
  <h3>🍗 Food: <span id="food">100</span></h3>
</div>

<div id="eatBtn">EAT</div>

<div id="joyBase"><div id="joyStick"></div></div>

<script src="game.js"></script>
</body>
</html>
