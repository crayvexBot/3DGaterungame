<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Gate Run Mobile 3D</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  z-index:10;
}

/* JOYSTICK */
#joyBase {
  position:absolute;
  bottom:40px;
  left:40px;
  width:120px;
  height:120px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
}

#joyStick {
  position:absolute;
  width:50px;
  height:50px;
  background:white;
  border-radius:50%;
  top:35px;
  left:35px;
}

/* JUMPSCARE */
#jumpscare {
  position:absolute;
  width:100%;
  height:100%;
  background:red;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:50px;
  color:black;
  z-index:999;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
</head>

<body>

<div id="ui">
  <h2>🚪 Gate: <span id="gate">1</span></h2>
  <h3>❤️ HP: <span id="hp">100</span></h3>
</div>

<div id="joyBase">
  <div id="joyStick"></div>
</div>

<div id="jumpscare">YOU DIED</div>

<script src="game.js"></script>

</body>
</html>
